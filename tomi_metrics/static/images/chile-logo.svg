<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="circle"><circle cx="16" cy="16" r="16"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Canton azul (arriba izquierda) -->
    <rect width="16" height="16" fill="#0032A0"/>
    <!-- Estrella blanca en el canton -->
    <polygon points="8,4.5 9,8 12.5,8 10,10.5 11,14 8,12 5,14 6,10.5 3.5,8 7,8" fill="#fff"/>
    <!-- Franja blanca (arriba derecha) -->
    <rect x="16" y="0" width="16" height="16" fill="#fff"/>
    <!-- Franja roja (abajo, ancho completo) -->
    <rect x="0" y="16" width="32" height="16" fill="#DA291C"/>
  </g>
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
</svg>
