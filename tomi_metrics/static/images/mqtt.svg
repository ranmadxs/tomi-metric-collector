<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48">
  <defs>
    <linearGradient id="fiberCore" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="30%" style="stop-color:#2d3d5c"/>
      <stop offset="50%" style="stop-color:#3c5280"/>
      <stop offset="70%" style="stop-color:#2d3d5c"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="fiberShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5fcaf4;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#5fcaf4;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Ondas punta izquierda - emanan del cable -->
  <path d="M 24 22 Q 8 14 0 22 Q 8 30 24 22" fill="none" stroke="#3c5280" stroke-width="0.7" opacity="0.5"/>
  <path d="M 24 22 Q 14 16 4 22 Q 14 28 24 22" fill="none" stroke="#5fcaf4" stroke-width="0.5" opacity="0.35"/>
  <path d="M 24 22 Q 18 18 12 22 Q 18 26 24 22" fill="none" stroke="#3c5280" stroke-width="0.4" opacity="0.25"/>
  <!-- Ondas punta derecha -->
  <path d="M 136 22 Q 152 14 160 22 Q 152 30 136 22" fill="none" stroke="#3c5280" stroke-width="0.7" opacity="0.5"/>
  <path d="M 136 22 Q 146 16 156 22 Q 146 28 136 22" fill="none" stroke="#5fcaf4" stroke-width="0.5" opacity="0.35"/>
  <path d="M 136 22 Q 142 18 148 22 Q 142 26 136 22" fill="none" stroke="#3c5280" stroke-width="0.4" opacity="0.25"/>
  <!-- Cable de fibra óptica -->
  <rect x="24" y="16" width="112" height="12" rx="6" fill="url(#fiberCore)"/>
  <rect x="24" y="16" width="112" height="4" rx="2" fill="url(#fiberShine)"/>
  <!-- MqTT a todo el ancho -->
  <text x="80" y="34" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">MqTT</text>
</svg>
