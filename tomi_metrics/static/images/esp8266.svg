    <circle class="glow-node" cx="275" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="285" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="305" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="35" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="55" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="75" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="95" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="115" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="135" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
