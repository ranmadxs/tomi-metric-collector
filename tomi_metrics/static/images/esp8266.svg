    <circle class="glow-node" cx="115" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="135" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="155" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="175" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="195" cy="22" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
