    <path class="light-pulse" d="M 215 178 L 215 128 L 202 106" style="animation-delay: 0.67s"/>
    <path class="light-pulse" d="M 235 178 L 235 132 L 202 110" style="animation-delay: 0.74s"/>
    <path class="light-pulse" d="M 255 178 L 255 130 L 202 114" style="animation-delay: 0.81s"/>
    <path class="light-pulse" d="M 275 178 L 275 135 L 202 118" style="animation-delay: 0.88s"/>
    <path class="light-pulse" d="M 285 178 L 285 132 L 202 122" style="animation-delay: 0.95s"/>
    <path class="light-pulse" d="M 305 178 L 305 135 L 202 126" style="animation-delay: 1.02s"/>
  </g>

  <!-- Pin nodes - arriba y abajo (lados largos) -->
