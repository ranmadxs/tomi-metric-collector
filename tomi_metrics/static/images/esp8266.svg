  <!-- Pin labels - Top (lado largo arriba) -->
  <text x="35" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">VIN</text>
  <text x="55" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">GND</text>
  <text x="75" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">RST</text>
  <text x="95" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">EN</text>
  <text x="115" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">3V3</text>
  <text x="135" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">GND</text>
  <text x="155" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">CLK</text>
  <text x="175" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SDO</text>
  <text x="195" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">CMD</text>
  <text x="215" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SDI</text>
  <text x="235" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SD0</text>
  <text x="255" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SD1</text>
  <text x="275" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SD2</text>
  <text x="285" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">SD3</text>
  <text x="305" y="18" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">A0</text>
  <!-- Pin labels - Bottom (lado largo abajo) -->
  <text x="35" y="185" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">3V3</text>
  <text x="55" y="185" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">GND</text>
