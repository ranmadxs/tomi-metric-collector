<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    @keyframes traceGlow { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes nodePulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; } }
    @keyframes lightTravel {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 420; }
    }
    .trace { animation: traceGlow 3s ease-in-out infinite; }
    .glow-node { animation: nodePulse 2s ease-in-out infinite; }
    .light-pulse {
      stroke-dasharray: 20 400;
      animation: lightTravel 2.5s linear infinite;
    }
  </style>
  <defs>
    <filter id="traceGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="chipGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="nodeRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="50%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </radialGradient>
  </defs>

  <!-- PCB -->
  <rect x="0" y="0" width="320" height="200" fill="#050a12"/>
  <rect x="15" y="15" width="290" height="170" rx="8" fill="#0a1220" stroke="#0f2744" stroke-width="0.5"/>

  <!-- NodeMCU v2: pines en los lados LARGOS (arriba y abajo). X: 35,55,75...285 (15 pins) -->
  <!-- Arriba (y=22): VIN,GND,RST,EN,3V3,GND,CLK,SDO,CMD,SDI,SD0,SD1,SD2,SD3,A0 -->
  <!-- Abajo (y=178): 3V3,GND,TX,RX,D8,D7,D6,D5,D4,D3,D2,D1,D0,-,- -->

  <!-- Circuit traces - desde lados largos (arriba/abajo) hacia el chip -->
  <g filter="url(#traceGlow)" class="trace">
    <!-- Top 15 pins - trazas bajan hacia el chip -->
    <path d="M 35 22 L 35 65 L 118 82" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 55 22 L 55 70 L 118 86" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 75 22 L 75 68 L 118 90" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 95 22 L 95 72 L 118 94" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 115 22 L 115 70 L 118 98" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 135 22 L 135 68 L 118 102" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 155 22 L 155 65 L 160 106" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 175 22 L 175 68 L 202 102" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 195 22 L 195 70 L 202 98" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 215 22 L 215 72 L 202 94" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 235 22 L 235 68 L 202 90" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 255 22 L 255 70 L 202 86" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 275 22 L 275 65 L 202 82" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 285 22 L 285 68 L 202 78" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 305 22 L 305 65 L 202 75" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <!-- Bottom 15 pins - trazas suben hacia el chip -->
    <path d="M 35 178 L 35 135 L 118 118" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 55 178 L 55 130 L 118 122" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 75 178 L 75 132 L 118 126" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 95 178 L 95 128 L 118 130" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 115 178 L 115 130 L 118 134" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 135 178 L 135 132 L 118 138" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 155 178 L 155 135 L 160 100" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 175 178 L 175 132 L 202 98" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 195 178 L 195 130 L 202 102" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 215 178 L 215 128 L 202 106" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 235 178 L 235 132 L 202 110" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 255 178 L 255 130 L 202 114" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 275 178 L 275 135 L 202 118" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 285 178 L 285 132 L 202 122" stroke="#4dd0e1" stroke-width="1" fill="none"/>
    <path d="M 305 178 L 305 135 L 202 126" stroke="#4dd0e1" stroke-width="1" fill="none"/>
  </g>

  <!-- Light pulse -->
  <g stroke="#e0f7fa" stroke-width="2" fill="none" opacity="0.95" filter="url(#traceGlow)">
    <path class="light-pulse" d="M 35 22 L 35 65 L 118 82"/>
    <path class="light-pulse" d="M 55 22 L 55 70 L 118 86" style="animation-delay: 0.07s"/>
    <path class="light-pulse" d="M 75 22 L 75 68 L 118 90" style="animation-delay: 0.14s"/>
    <path class="light-pulse" d="M 95 22 L 95 72 L 118 94" style="animation-delay: 0.21s"/>
    <path class="light-pulse" d="M 115 22 L 115 70 L 118 98" style="animation-delay: 0.28s"/>
    <path class="light-pulse" d="M 135 22 L 135 68 L 118 102" style="animation-delay: 0.35s"/>
    <path class="light-pulse" d="M 155 22 L 155 65 L 160 106" style="animation-delay: 0.42s"/>
    <path class="light-pulse" d="M 175 22 L 175 68 L 202 102" style="animation-delay: 0.49s"/>
    <path class="light-pulse" d="M 195 22 L 195 70 L 202 98" style="animation-delay: 0.56s"/>
    <path class="light-pulse" d="M 215 22 L 215 72 L 202 94" style="animation-delay: 0.63s"/>
    <path class="light-pulse" d="M 235 22 L 235 68 L 202 90" style="animation-delay: 0.70s"/>
    <path class="light-pulse" d="M 255 22 L 255 70 L 202 86" style="animation-delay: 0.77s"/>
    <path class="light-pulse" d="M 275 22 L 275 65 L 202 82" style="animation-delay: 0.84s"/>
    <path class="light-pulse" d="M 285 22 L 285 68 L 202 78" style="animation-delay: 0.91s"/>
    <path class="light-pulse" d="M 305 22 L 305 65 L 202 75" style="animation-delay: 0.98s"/>
    <path class="light-pulse" d="M 35 178 L 35 135 L 118 118" style="animation-delay: 0.04s"/>
    <path class="light-pulse" d="M 55 178 L 55 130 L 118 122" style="animation-delay: 0.11s"/>
    <path class="light-pulse" d="M 75 178 L 75 132 L 118 126" style="animation-delay: 0.18s"/>
    <path class="light-pulse" d="M 95 178 L 95 128 L 118 130" style="animation-delay: 0.25s"/>
    <path class="light-pulse" d="M 115 178 L 115 130 L 118 134" style="animation-delay: 0.32s"/>
    <path class="light-pulse" d="M 135 178 L 135 132 L 118 138" style="animation-delay: 0.39s"/>
