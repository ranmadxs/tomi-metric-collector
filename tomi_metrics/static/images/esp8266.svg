    <circle class="glow-node" cx="195" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
    <circle class="glow-node" cx="215" cy="178" r="2.5" fill="url(#nodeRadial)" stroke="#80deea" stroke-width="0.5"/>
