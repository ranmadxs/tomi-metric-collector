  <text x="160" y="98" text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif" font-size="11" font-weight="700" fill="#80deea">ESP8266</text>
  <text x="160" y="107" text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif" font-size="6" font-weight="500" fill="#4dd0e1" opacity="0.9">80 MHz - 4 MB Flash</text>
  <text x="160" y="114" text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif" font-size="6" font-weight="500" fill="#4dd0e1" opacity="0.9">64 KB RAM</text>
