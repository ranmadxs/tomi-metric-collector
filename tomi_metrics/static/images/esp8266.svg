  <text x="305" y="185" font-family="monospace" font-size="5" fill="#80deea" font-weight="600" text-anchor="middle">-</text>

  <!-- Peripheral components -->
  <rect x="55" y="65" width="10" height="3" rx="1" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="0.3"/>
  <rect x="255" y="65" width="10" height="3" rx="1" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="0.3"/>
  <ellipse cx="75" cy="95" rx="4" ry="2.5" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="0.3"/>
  <ellipse cx="245" cy="95" rx="4" ry="2.5" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="0.3"/>

